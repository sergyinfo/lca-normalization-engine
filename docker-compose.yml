##############################################################################
# LCA Normalization Engine — Local "Historical Backfill" Stack
#
# Services:
#   db               PostgreSQL 16 with declarative partitioning
#   redis            Redis 7 — BullMQ backend
#   nlp-worker       Python NLP worker (SOC classification + entity resolution)
#   ingestion-worker Node.js BullMQ worker (XLSX → PostgreSQL COPY)
#
# Usage:
#   cp .env.example .env          # configure credentials / paths
#   docker compose up -d          # start all services
#   docker compose logs -f        # tail logs
##############################################################################

services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: lca_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lca_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lca_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lca_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    command:
      # Tuning for bulk-load workloads (12M rows)
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - effective_cache_size=2GB
      - -c
      - synchronous_commit=off   # safe for backfill; re-enable for production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lca_user} -d ${POSTGRES_DB:-lca_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Redis 7
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lca_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # NLP Worker (Python)
  # Runs packages/nlp-engine — SOC classification + entity resolution
  # --------------------------------------------------------------------------
  nlp-worker:
    build:
      context: ./packages/nlp-engine
      dockerfile: Dockerfile
    container_name: lca_nlp_worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-lca_user}:${POSTGRES_PASSWORD:-lca_pass}@db:5432/${POSTGRES_DB:-lca_db}
      NLP_WORKER_CONCURRENCY: ${NLP_WORKER_CONCURRENCY:-2}
      NLP_DEVICE: ${NLP_DEVICE:-cpu}
      NLP_STAGE2_MODEL: ${NLP_STAGE2_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      NLP_STAGE2_THRESHOLD: ${NLP_STAGE2_THRESHOLD:-0.7}
      # Persist HuggingFace model downloads across container rebuilds
      HF_HOME: /root/.cache/huggingface
    volumes:
      # Persist sentence-transformer / transformers model cache
      - hf-cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  # --------------------------------------------------------------------------
  # Operator HITL UI (Node.js)
  # Runs apps/operator-ui — Fastify web app for walking the three review queues
  # (requires_review records, staging.quarantine_records, staging.unresolved_employers).
  # Auth: single shared password from OPERATOR_PASSWORD, signed cookie session.
  # --------------------------------------------------------------------------
  operator-ui:
    build:
      context: .
      dockerfile: apps/operator-ui/Dockerfile
    container_name: lca_operator_ui
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lca_user}:${POSTGRES_PASSWORD:-lca_pass}@db:5432/${POSTGRES_DB:-lca_db}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      OPERATOR_UI_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      # Release controls (Promote / Rebuild preview / Shut down). Only set on the
      # burst review box — absent locally, so the controls hide themselves.
      INSTANCE_ID: ${INSTANCE_ID:-}
      RELEASE: ${RELEASE:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      EVENT_SOURCE: ${EVENT_SOURCE:-lca.operator}
    ports:
      - "${OPERATOR_UI_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Analytics Dashboard (Node.js)
  # Runs apps/analytics-ui — public, read-only persona-driven views over the
  # canonicalised corpus. No auth.
  # --------------------------------------------------------------------------
  analytics-ui:
    build:
      context: .
      dockerfile: apps/analytics-ui/Dockerfile
    container_name: lca_analytics_ui
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lca_user}:${POSTGRES_PASSWORD:-lca_pass}@db:5432/${POSTGRES_DB:-lca_db}
      ANALYTICS_UI_PORT: 8081
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    ports:
      - "${ANALYTICS_UI_PORT:-8081}:8081"
    depends_on:
      db:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Analytics Web (Next.js 15 — production website)
  # Runs apps/analytics-web — public, SEO-first, monetisable. Reads from a
  # read-only SQLite file baked into the image at build time. Does NOT
  # connect to Postgres at runtime, so it survives a `docker compose stop db`.
  #
  # Build prerequisite: `pnpm --filter analytics-web build:data` on the host
  # (generates the lca.db that gets copied into the image).
  #
  # The keys.db (API keys, mutable) lives on the analytics-web-keys volume
  # so create/revoke don't require a rebuild. Bind-mount it to a host
  # directory if you want to run `pnpm keys:*` from the host instead of
  # via `docker exec`.
  # --------------------------------------------------------------------------
  analytics-web:
    build:
      context: .
      dockerfile: apps/analytics-web/Dockerfile
    container_name: lca_analytics_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_NAME: ${SITE_NAME:-H1B Report}
      NEXT_PUBLIC_SITE_URL:  ${SITE_URL:-https://h1b.report}
      LCA_KEYS_DB_PATH:      /keys/keys.db
      # AdSense — leave unset to render dev placeholders.
      ADSENSE_CLIENT_ID:     ${ADSENSE_CLIENT_ID:-}
      ADSENSE_SLOTS:         ${ADSENSE_SLOTS:-}
      NODE_ENV:              production
    ports:
      - "${ANALYTICS_WEB_PORT:-3000}:3000"
    volumes:
      - analytics-web-keys:/keys

  # --------------------------------------------------------------------------
  # Ingestion Worker (Node.js)
  # Runs apps/ingestor — XLSX streaming → pg-copy-streams → PostgreSQL
  # --------------------------------------------------------------------------
  ingestion-worker:
    build:
      context: .
      dockerfile: apps/ingestor/Dockerfile
    container_name: lca_ingestion_worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-lca_user}:${POSTGRES_PASSWORD:-lca_pass}@db:5432/${POSTGRES_DB:-lca_db}
      INGESTOR_CONCURRENCY: ${INGESTOR_CONCURRENCY:-4}
      INGESTOR_BATCH_SIZE: ${INGESTOR_BATCH_SIZE:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # Mount the local LCA archive so the worker can access XLSX files
      - ${LOCAL_FILES_DIR:-./data}:/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

# --------------------------------------------------------------------------
# Named volumes (Docker-managed, survives container restarts)
# --------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  hf-cache:
    driver: local
  # Mutable API-key DB for analytics-web (survives image rebuilds).
  analytics-web-keys:
    driver: local
