# Branch-per-environment deploy for the analytics-web Lambda image.
#
#   PR → develop|production           : typecheck only (required merge gate)
#   merge to develop  (push)          : build image → deploy to DEV  (dev.h1b.report)
#   merge to production (push)        : build image → deploy to PROD (h1b.report)
#
# develop and production are protected (PR-only). Auth: GitHub OIDC → IAM role
# `github-actions-deploy` (develop/production refs only, no long-lived keys).
# Data is NOT touched here — lca.db is pulled from S3 as-is and baked into the
# image, so there are **no LLM / build:summaries calls**. Refresh data via the
# quarterly burst (LcaDataPipelineStack) or `pnpm build:data` locally.

name: build-and-deploy

on:
  pull_request:
    branches: [develop, production]
  push:
    branches: [develop, production]
    paths:
      - 'apps/analytics-web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/build-and-deploy.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: lca-analytics-web

jobs:
  # Required status check on every PR (and again before a deploy).
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter analytics-web typecheck

  deploy:
    needs: typecheck
    if: github.event_name == 'push'      # deploy only on a merge, never on a PR
    runs-on: ubuntu-latest               # swap to `ubuntu-24.04-arm` (native, faster) if your plan offers arm64 runners
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target by branch
        run: |
          if [ "${{ github.ref_name }}" = "production" ]; then
            { echo "TAG=prod"; echo "FN=lca-analytics-web-prod"; echo "STACK=LcaServeProdStack"; echo "TARGET=h1b.report"; } >> "$GITHUB_ENV"
          else
            { echo "TAG=latest"; echo "FN=lca-analytics-web"; echo "STACK=LcaServeStack"; echo "TARGET=dev.h1b.report"; } >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::299834553927:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR URI
        id: ecr
        run: echo "uri=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}" >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull lca.db from S3 (gitignored; baked into the image)
        run: |
          BUCKET=$(aws cloudformation describe-stack-resources --stack-name LcaSharedStack \
            --query "StackResources[?starts_with(LogicalResourceId,'LcaDbBucket')].PhysicalResourceId | [0]" --output text)
          mkdir -p apps/analytics-web/data
          aws s3 cp "s3://${BUCKET}/lca.db" apps/analytics-web/data/lca.db

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        run: |
          docker buildx build --platform linux/arm64 --provenance=false --sbom=false \
            -f apps/analytics-web/Dockerfile.lambda \
            -t ${{ steps.ecr.outputs.uri }}:${TAG} \
            -t ${{ steps.ecr.outputs.uri }}:${{ github.sha }} \
            --push .

      - name: Deploy (update Lambda + invalidate cache)
        run: |
          aws lambda update-function-code --function-name "${FN}" --image-uri ${{ steps.ecr.outputs.uri }}:${TAG} >/dev/null
          aws lambda wait function-updated --function-name "${FN}"
          DIST=$(aws cloudformation describe-stacks --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths '/*' >/dev/null
          echo "Deployed ${GITHUB_REF_NAME} → https://${TARGET}"
