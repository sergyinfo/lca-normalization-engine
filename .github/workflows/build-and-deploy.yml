# Push-to-deploy for the analytics-web Lambda image.
#
#   push to main (app/infra changes)     → typecheck → build image → deploy to DEV
#   manual run with promote_to_prod=true → same, then promote to PROD (h1b.report)
#
# Auth: GitHub OIDC → IAM role `github-actions-deploy` (main branch only, no
# long-lived keys). Data is NOT touched here — lca.db is pulled from S3 as-is and
# baked into the image, so there are **no LLM / build:summaries calls**. Refresh
# the data via the quarterly burst (LcaDataPipelineStack) or `pnpm build:data`
# locally, which uploads a fresh lca.db to S3 for the next image build.

name: build-and-deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/analytics-web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: 'Also promote this build to production (h1b.report)'
        type: boolean
        default: false

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: lca-analytics-web
  DEV_FN: lca-analytics-web
  DEV_STACK: LcaServeStack

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter analytics-web typecheck

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest          # swap to `ubuntu-24.04-arm` (native arm64) for a faster build if your plan has it
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::299834553927:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR URI
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "uri=$ACCOUNT.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}" >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull lca.db from S3 (gitignored; baked into the image)
        run: |
          BUCKET=$(aws cloudformation describe-stack-resources --stack-name LcaSharedStack \
            --query "StackResources[?starts_with(LogicalResourceId,'LcaDbBucket')].PhysicalResourceId | [0]" --output text)
          mkdir -p apps/analytics-web/data
          aws s3 cp "s3://${BUCKET}/lca.db" apps/analytics-web/data/lca.db

      # arm64 to match the Lambda architecture. On an x86 runner QEMU emulates it
      # (slower); on an arm64 runner it's native — then this QEMU step is a no-op.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build + push image (:latest + :sha)
        run: |
          docker buildx build --platform linux/arm64 --provenance=false --sbom=false \
            -f apps/analytics-web/Dockerfile.lambda \
            -t ${{ steps.ecr.outputs.uri }}:latest \
            -t ${{ steps.ecr.outputs.uri }}:${{ github.sha }} \
            --push .

      - name: Deploy to dev (update Lambda + invalidate cache)
        run: |
          aws lambda update-function-code --function-name "${DEV_FN}" \
            --image-uri ${{ steps.ecr.outputs.uri }}:latest >/dev/null
          aws lambda wait function-updated --function-name "${DEV_FN}"
          DIST=$(aws cloudformation describe-stacks --stack-name "${DEV_STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths '/*' >/dev/null
          echo "Deployed to https://dev.h1b.report"

      - name: Promote to prod (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.promote_to_prod }}
        run: |
          chmod +x infra/aws/scripts/promote-to-prod.sh
          ./infra/aws/scripts/promote-to-prod.sh
          echo "Promoted to https://h1b.report"
