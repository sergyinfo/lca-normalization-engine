packages:
  - 'packages/*'
  - 'apps/*'

# Native deps allowed to run install scripts. pnpm 10.16+/11 blocks build
# scripts by default and errors (ERR_PNPM_IGNORED_BUILDS) unless they're
# allowlisted here. sharp powers Next.js OG-image rendering; esbuild backs
# tsx/bundling; unrs-resolver is an eslint resolver.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
