[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lca-nlp-engine"
version = "0.1.0"
description = "NLP workers for SOC code classification (BERT) and company deduplication (Entity Resolution)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # BERT-based SOC classification
    "transformers>=4.40.0",
    "sentence-transformers>=3.0.0",
    "torch>=2.2.0",
    # Entity Resolution / company deduplication
    "dedupe>=3.0.0",
    # Database
    "psycopg[binary,pool]>=3.1.0",
    # Queue (BullMQ-compatible Redis client)
    "redis>=5.0.0",
    # Data processing
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "openpyxl>=3.1.0",
    # Utilities
    "python-dotenv>=1.0.0",
    "pydantic>=2.7.0",
    "structlog>=24.0.0",
    "tqdm>=4.66.0",
    # LLM-on-residual (Stage 3)
    "httpx>=0.27.0",
    "anthropic>=0.40.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.10.0",
    "ruff>=0.4.0",
]
gpu = [
    # In GPU environments, install torch with CUDA support via:
    #   pip install torch>=2.2.0 --index-url https://download.pytorch.org/whl/cu121
]

[project.scripts]
nlp-worker = "lca_nlp_engine.worker:main"
classify-soc = "lca_nlp_engine.soc_classifier:cli_main"
dedup-companies = "lca_nlp_engine.entity_resolution:cli_main"
load-dmtf = "lca_nlp_engine.dmtf_loader:cli_main"
bootstrap-aliases = "lca_nlp_engine.alias_bootstrap:cli_main"
reclassify-quarantine = "lca_nlp_engine.reclassify_quarantine:main"
refresh-employer-consensus = "lca_nlp_engine.employer_consensus:cli_main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
